<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LM Studio Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="flex h-screen">

    <div id="sidebar"
     class="sidebar h-full bg-[#202123] transition-all duration-300 flex flex-col"
     style="width: 16rem;">
    <!-- ... sidebar contents ... -->
      <div class="flex items-center justify-end p-2" style="min-height: 3.5rem;">
      <button id="toggleSidebarBtn" class="bg-gray-700 p-2 rounded-full flex items-center justify-center transition-all duration-300">
        <i id="toggleSidebarIcon" class="fas fa-bars"></i>
      </button>
    </div>
    <div id="sidebarContent" class="flex-1 flex flex-col transition-opacity duration-200 opacity-100">

        <button id="newChatBtn" class="w-full text-left bg-gray-700 hover:bg-gray-600 rounded-lg p-3 text-sm font-semibold flex items-center">
            <i class="fas fa-plus mr-3"></i> New Chat
        </button>
        <div id="chat-history-container" class="mt-4 flex-grow overflow-y-auto">
        </div>
        <div class="border-t border-gray-600 pt-4">
             <div class="flex items-center space-x-2 p-2 rounded-lg">
                 <i class="fas fa-server text-gray-400"></i>
                 <span class="text-sm font-medium text-gray-400">Server-Configured</span>
             </div>
        </div>
         <div class="flex items-center justify-end p-2">
       
    </div>
    </div>
    </div>

   <div class="flex-grow flex flex-col bg-[#282828] transition-all duration-300">
        <div id="chat-container" class="flex-grow p-4 md:p-6 overflow-y-auto">
            <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center">
                <h1 class="text-4xl font-bold mb-4">LM Studio Chat</h1>
                <p class="text-gray-400">Your local AI companion. Start a conversation below.</p>
                 <div class="mt-8 text-xs text-gray-500">
                     Note: This interface connects to a local LM Studio server. Ensure your server is running.
                 </div>
            </div>
            </div>

        <div class="chat-input-container p-4 md:p-6 border-t border-gray-700">
            <div class="max-w-4xl mx-auto flex items-center bg-[#40414f] rounded-xl p-2">
                <textarea id="userInput" class="flex-grow bg-transparent text-white placeholder-gray-400 focus:outline-none resize-none p-2" placeholder="Message LM Studio..." rows="1"></textarea>
                <div class="flex items-center mx-3 space-x-2">
                    <button id="newsToggle" class="icon-toggle" title="Toggle News">
                        <i class="fas fa-newspaper"></i>
                    </button>
                    <button id="searchToggle" class="icon-toggle" title="Toggle Search">
                        <i class="fas fa-search"></i>
                    </button>
                    <button id="weatherToggle" class="icon-toggle" title="Toggle Weather">
                        <i class="fas fa-cloud-sun"></i>
                    </button>
                    <button id="fetchToggle" class="icon-toggle" title="Toggle URL Fetch">
                        <i class="fas fa-link"></i>
                    </button>
                    <!-- Add this: -->
                    <button id="xPostToggle" class="icon-toggle" title="Toggle X Post">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
                        <path d="M17.217 3.084H20.934L13.89 10.667l8.282 10.249h-6.469l-5.072-6.287-5.808 6.287H3.23l7.444-8.058L2.705 3.084h6.635l4.483 5.794zm-1.041 16.176h1.785L6.821 4.023h-1.9l10.255 12.969z"/>
                    </svg>
                    </button>
                    <button id="pcToggle" class="icon-toggle" title="Toggle PC Control">
                        <i class="fas fa-desktop"></i>
                    </button>

                </div>
                <div class="flex items-center mr-3">
                    <label for="thinkToggle" class="flex items-center cursor-pointer">
                        <div class="relative">
                            <label class="toggle-label">
                                <input type="checkbox" id="thinkToggle" class="sr-only">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="ml-3 text-gray-300 text-sm font-medium">Think</div>
                    </label>
                </div>
                <button id="sendBtn" class="bg-gray-700 hover:bg-gray-600 text-white rounded-lg px-4 py-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <p class="text-xs text-center text-gray-500 mt-2">
                This is a local chatbot. Your conversations are not sent to any external servers.
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
